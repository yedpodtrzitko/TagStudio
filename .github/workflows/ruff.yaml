name: Ruff
on: [ push, pull_request ]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1
        name: Format Check
        with:
          version: 0.4.5
          args: 'format --check'
      - uses: chartboost/ruff-action@v1
        name: Imports Check
        with:
          version: 0.4.5
          args: 'check --select I'
